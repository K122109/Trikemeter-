<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>TriFare Smart Meter</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#map{
height:45vh;
width:100%;
}

.meter{
font-size:36px;
font-weight:bold;
padding:10px;
background:black;
}

.panel{
font-size:18px;
padding:10px;
}

button{
padding:16px;
margin:6px;
font-size:18px;
border:none;
border-radius:8px;
background:#00aaff;
color:white;
width:30%;
}

button:disabled{
background:#555;
}

.history{
max-height:160px;
overflow:auto;
background:#222;
padding:10px;
font-size:14px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background:#222;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

.modal button{
width:100%;
margin:8px 0;
font-size:16px;
padding:14px;
}

</style>

</head>

<body>

<div id="fareModal" class="modal">

<div class="modal-content">

<h2>Select Fare Type</h2>

<button onclick="selectFare(25,5)">Solo Regular<br>₱25 first km | ₱5/km</button>
<button onclick="selectFare(45,10)">Multiple Regular<br>₱45 first km | ₱10/km</button>
<button onclick="selectFare(20,5)">Solo Special<br>₱20 first km | ₱5/km</button>
<button onclick="selectFare(40,10)">Multiple Special<br>₱40 first km | ₱10/km</button>

</div>
</div>

<h2>TriFare Smart Meter</h2>

<div id="map"></div>

<div class="meter">
₱ <span id="fare">0.00</span>
</div>

<div class="panel">

Distance: <span id="distance">0.000</span> km<br>
Duration: <span id="time">0</span> sec<br>
Speed: <span id="speed">0</span> km/h

</div>

<button id="startBtn" onclick="startTrip()" disabled>Start</button>
<button id="stopBtn" onclick="stopTrip()" disabled>Stop</button>
<button id="resetBtn" onclick="resetTrip()" disabled>Reset</button>

<hr>

Selected Fare:
₱<span id="selectedBase">0</span> first km |
₱<span id="selectedRate">0</span>/km

<hr>

<h3>Trip History</h3>

<div class="history" id="history"></div>

<script>

let map = L.map('map').setView([14.5995,120.9842],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let marker;
let polyline = L.polyline([], {color:'red'}).addTo(map);

let watchId=null;

let totalDistance=0;
let lastLatLng=null;
let lastTimestamp=null;

let startTime=0;
let timerInterval=null;

let firstKmFare=0;
let ratePerKm=0;

let tripRunning=false;



function selectFare(firstKm,rate){

firstKmFare=firstKm;
ratePerKm=rate;

document.getElementById("selectedBase").innerText=firstKm;
document.getElementById("selectedRate").innerText=rate;

document.getElementById("fareModal").style.display="none";

enableControls();

requestLocationPermission();

}



function enableControls(){

document.getElementById("startBtn").disabled=false;
document.getElementById("stopBtn").disabled=false;
document.getElementById("resetBtn").disabled=false;

}



function requestLocationPermission(){

if(!navigator.geolocation){

alert("Geolocation not supported on this device.");

return;

}

navigator.geolocation.getCurrentPosition(

()=>console.log("Location permission granted"),

handleLocationError

);

}



function startTrip(){

if(tripRunning) return;

tripRunning=true;

startTime=Date.now();

timerInterval=setInterval(updateTime,1000);

watchId=navigator.geolocation.watchPosition(

updatePosition,

handleLocationError,

{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}

);

}



function stopTrip(){

if(!tripRunning) return;

navigator.geolocation.clearWatch(watchId);

clearInterval(timerInterval);

tripRunning=false;

saveTrip();

}



function resetTrip(){

totalDistance=0;
lastLatLng=null;
lastTimestamp=null;

polyline.setLatLngs([]);

document.getElementById("distance").innerText="0.000";
document.getElementById("fare").innerText="0.00";
document.getElementById("time").innerText="0";
document.getElementById("speed").innerText="0";

}



function updateTime(){

let duration=Math.floor((Date.now()-startTime)/1000);

document.getElementById("time").innerText=duration;

}



function calculateFare(){

if(totalDistance<=1){
return firstKmFare;
}

return firstKmFare + ((totalDistance-1)*ratePerKm);

}



function updatePosition(position){

let lat = position.coords.latitude;
let lng = position.coords.longitude;

let current = L.latLng(lat,lng);

if(!marker){
marker=L.marker(current).addTo(map);
}else{
marker.setLatLng(current);
}

polyline.addLatLng(current);

map.setView(current,17);



if(lastLatLng){

let segment=lastLatLng.distanceTo(current)/1000;

if(segment < 0.1){
totalDistance+=segment;
}

}



let speed=0;

if(lastTimestamp){

let timeDiff=(position.timestamp-lastTimestamp)/1000;

let distanceDiff=lastLatLng.distanceTo(current)/1000;

speed=(distanceDiff/timeDiff)*3600;

}



document.getElementById("speed").innerText=speed.toFixed(1);



lastLatLng=current;
lastTimestamp=position.timestamp;



let fare=calculateFare();

document.getElementById("distance").innerText=totalDistance.toFixed(3);
document.getElementById("fare").innerText=fare.toFixed(2);

}



function handleLocationError(error){

let message="";

switch(error.code){

case error.PERMISSION_DENIED:
message="Location access denied. Please enable GPS permission in your browser settings.";
break;

case error.POSITION_UNAVAILABLE:
message="Location information unavailable.";
break;

case error.TIMEOUT:
message="GPS request timed out.";
break;

default:
message="Unknown GPS error.";

}

alert(message);

}



function saveTrip(){

let fare=calculateFare();

let duration=Math.floor((Date.now()-startTime)/1000);

let trip={

date:new Date().toLocaleString(),
distance:totalDistance.toFixed(2),
fare:fare.toFixed(2),
duration:duration

};

let trips=JSON.parse(localStorage.getItem("trips")||"[]");

trips.push(trip);

localStorage.setItem("trips",JSON.stringify(trips));

loadHistory();

}



function loadHistory(){

let trips=JSON.parse(localStorage.getItem("trips")||"[]");

let historyDiv=document.getElementById("history");

historyDiv.innerHTML="";

trips.reverse().forEach(t=>{

historyDiv.innerHTML+=
`<div>
${t.date}<br>
${t.distance} km | ₱${t.fare} | ${t.duration}s
</div><hr>`;

});

}



loadHistory();

</script>

</body>
</html>
